<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Agenda do Aluno</title>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f4f9;
        }

        header {
            background: url("../Imagens/ifsc.png") no-repeat center center;
            background-size: cover;
            min-height: 250px;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: white;
            margin: 0 12px;
            text-decoration: none;
            font-weight: 600;
        }

        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .section {
            background-color: #ffffff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .section:hover {
            transform: scale(1.01);
        }

        .section h2 {
            color: rgb(35, 91, 196);
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }

        th {
            background: rgb(35, 91, 196);
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        footer {
            background: #e0f2e9;
            color: #333;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            border-top: 1px solid #ccc;
        }

        footer a {
            color: rgb(36, 98, 211);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .header-content {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;  /* deixa o login na direita */
    padding: 20px;
}

/* Ajusta o título para ficar alinhado */
.header-content h1 {
    margin: 0;
}

/* Alinha todo o conteúdo do header */
.header-content {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;  /* empurra o login para a direita */
    padding: 20px;
}

/* Estiliza o botão de Login */
.login-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;      /* AUMENTA O TAMANHO DO BOTÃO */
    border-radius: 10px;
    color: white;
    text-decoration: none;
    font-weight: 700;
    font-size: 1.1rem;        /* AUMENTA A FONTE */
    transition: 0.3s ease;
}

.login-btn img {
    width: 28px;             /* ÍCONE MAIOR */
    height: 28px;
}

.login-btn:hover {
    background-color: rgba(0, 0, 0, 0.55);
    transform: scale(1.08);  /* efeito mais forte ao passar o mouse */
}

    </style>

</head>

<header>
    <h1>OrganizaAí</h1>
    <nav>
        <a href="home.html">Início</a>
        <a href="//127.0.0.1:5500/planilhas.html">Calendário Completo</a>
        <a href="agendaaluno.html">Agenda do Aluno</a>
        <a href="//www.ifsc.edu.br/cursos">Cursos</a>
        <a href="//www.ifsc.edu.br/noticias">Eventos</a>
        <a href="//www.ifsc.edu.br/fale-conosco">Contato IFSC</a>
    </nav>
     <a href="login.html" class="login-btn">
            <img src="../Imagens/login-icon.png" alt="login">
            Entrar
        </a>
    </div>
</header>

<body>

    <div class="container">

        <!-- TABELA -->
        <section class="section">
            <h2>Atividades da Semana</h2>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Matéria</th>
                        <th>Descrição</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="lista-tarefas">
                </tbody>
            </table>
        </section>

        <!-- FORMULÁRIO -->
        <section class="section">
            <h2>Adicionar Nova Tarefa</h2>

            <form id="form-tarefa">
                <label>Data:</label>
                <input id="data" type="date" style="padding:10px; width:100%; max-width:300px; margin-top:10px; border-radius:6px; border:1px solid #ccc;">

                <label style="display:block; margin-top:15px;">Matéria:</label>
                <input id="materia" type="text" placeholder="Ex: Matemática" style="padding:10px; width:100%; max-width:300px; border-radius:6px; border:1px solid #ccc;">

                <label style="display:block; margin-top:15px;">Descrição:</label>
                <input id="descricao" type="text" placeholder="Descreva a tarefa" style="padding:10px; width:100%; max-width:300px; border-radius:6px; border:1px solid #ccc;">

                <label style="display:block; margin-top:15px;">Status:</label>
                <select id="status">
                    <option>Pendente</option>
                    <option>Concluído</option>
                </select>

                <button type="submit" style="padding:10px; margin-top:20px; border:none; background:rgb(32, 96, 214); color:white; border-radius:6px; font-weight:bold; cursor:pointer;">
                    Adicionar
                </button>
            </form>
        </section>

    </div>

    <footer>
        <p>Agenda do Aluno © 2025 — <a href="#">Contato</a></p>
    </footer>

    <script src="/AgendaDoAluno/agenda.js"></script>
    

</body>
</html>
